<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thây màu nền bằng lick chuột</title>
</head>
<body>
    <h2>Thay đổi màu nền sử dụng đối tượng document</h2>
    <input type="button" name="ThayMauNen" value="Màu Xanh dương" onclick="document.bgColor = 'blue'">

    <br>
    <input type="button" name="ThayMauNen" value="Màu xanh lá" onclick="document.bgColor = 'green'">

    <br>
    <input type="button" name="ThayMauNen" value="Màu vàng" onclick="document.bgColor = 'yellow'">
</body>
</html>
